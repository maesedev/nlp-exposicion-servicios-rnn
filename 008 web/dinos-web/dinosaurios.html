<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería de Dinosaurios</title>
  <style>
    :root {
      --bg:        #0f1a10;
      --surface:   #1a2b1c;
      --border:    #2d4a30;
      --accent:    #6abf69;
      --accent2:   #a5d6a7;
      --text:      #e8f5e9;
      --muted:     #81c784;
      --card-bg:   #162418;
      --overlay:   rgba(0,0,0,.75);
      --radius:    14px;
      --shadow:    0 4px 24px rgba(0,0,0,.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .header-title .icon { font-size: 2rem; }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--accent);
    }

    header p {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn-crear {
      background: var(--accent);
      color: #0f1a10;
      border: none;
      padding: .65rem 1.4rem;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: background .2s, transform .1s;
    }
    .btn-crear:hover  { background: var(--accent2); transform: translateY(-1px); }
    .btn-crear:active { transform: translateY(0); }

    /* ── Grid ────────────────────────────────────────────────────────────── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.75rem;
    }

    /* ── Card ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .25s, box-shadow .25s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 32px rgba(0,0,0,.6);
    }

    .card-img {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: var(--radius) var(--radius) 0 0;
      transition: transform .4s ease;
    }
    .card:hover .card-img img { transform: scale(1.06); }
    .card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, var(--card-bg));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .card-body {
      padding: 1.1rem 1.3rem 1.4rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: .5rem;
      letter-spacing: .3px;
    }

    .card-era {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: .75rem;
    }

    .card-desc {
      font-size: .85rem;
      line-height: 1.6;
      color: #b9d4ba;
      flex: 1;
    }

    /* ── Modal backdrop ──────────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(4px);
    }
    .modal-backdrop.open { display: flex; }

    /* ── Modal box ───────────────────────────────────────────────────────── */
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 12px 40px rgba(0,0,0,.7);
      position: relative;
      animation: pop .25s ease;
    }

    @keyframes pop {
      from { transform: scale(.92); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }

    .modal h2 {
      font-size: 1.3rem;
      color: var(--accent);
      margin-bottom: .35rem;
    }
    .modal .subtitle {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: .4rem;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .65rem .9rem;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 1.25rem;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    .slider-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.75rem;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .slider-val {
      font-size: .9rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 2.5rem;
      text-align: right;
    }

    .btn-generar {
      width: 100%;
      background: var(--accent);
      color: #0f1a10;
      border: none;
      border-radius: 8px;
      padding: .75rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      transition: background .2s;
    }
    .btn-generar:hover    { background: var(--accent2); }
    .btn-generar:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Result panel ────────────────────────────────────────────────────── */
    .result-panel {
      display: none;
      margin-top: 1.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.3rem;
      text-align: center;
    }
    .result-panel.visible { display: block; }
    .result-label  { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: .35rem; }
    .result-name   { font-size: 1.7rem; font-weight: 800; color: var(--accent); letter-spacing: .5px; }
    .result-run    { font-size: .65rem; color: #4a6b4c; margin-top: .3rem; word-break: break-all; }

    .btn-describir {
      width: 100%;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: .6rem;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-top: .9rem;
      transition: background .2s, color .2s;
    }
    .btn-describir.visible       { display: flex; }
    .btn-describir:hover         { background: var(--accent); color: #0f1a10; }
    .btn-describir:disabled      { opacity: .5; cursor: not-allowed; }

    .desc-panel {
      display: none;
      margin-top: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      text-align: left;
    }
    .desc-panel.visible   { display: block; }
    .desc-panel-label     { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: .5rem; }
    .desc-panel-text      { font-size: .85rem; line-height: 1.65; color: #b9d4ba; }

    .btn-imagen {
      width: 100%;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .6rem;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-top: .9rem;
      transition: background .2s, color .2s, border-color .2s;
    }
    .btn-imagen.visible      { display: flex; }
    .btn-imagen:hover        { background: var(--border); color: var(--text); border-color: var(--muted); }
    .btn-imagen:disabled     { opacity: .5; cursor: not-allowed; }

    .img-panel {
      display: none;
      margin-top: 1rem;
    }
    .img-panel.visible { display: block; }
    .img-panel img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: block;
    }

    .error-msg {
      display: none;
      margin-top: 1rem;
      background: #3b1010;
      border: 1px solid #7b2222;
      border-radius: 8px;
      padding: .7rem 1rem;
      font-size: .82rem;
      color: #f48a8a;
    }
    .error-msg.visible { display: block; }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(15,26,16,.4);
      border-top-color: #0f1a10;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .btn-crear { align-self: flex-end; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-title">
    <span class="icon">🦕</span>
    <div>
      <h1>Galería de Dinosaurios</h1>
      <p>Especies generadas por IA · NLP Lab</p>
    </div>
  </div>
  <button class="btn-crear" id="btnAbrir">
    <span>＋</span> Crear Dinosaurio
  </button>
</header>

<!-- ── Cards ───────────────────────────────────────────────────────────────── -->
<main>
  <div class="grid" id="grid"></div>
</main>

<!-- ── Modal ───────────────────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="modal-close" id="btnCerrar" aria-label="Cerrar">✕</button>

    <h2 id="modalTitle">🧬 Crear Dinosaurio</h2>
    <p class="subtitle">El modelo RNN completará el nombre a partir de tu prefijo.</p>

    <label for="inputPrefijo">Prefijo</label>
    <input
      type="text"
      id="inputPrefijo"
      placeholder="ej. hun, tyro, mylo"
      maxlength="12"
      autocomplete="off"
    />

    <label for="inputTemp">Temperatura — creatividad del modelo</label>
    <div class="slider-row">
      <input
        type="range"
        id="inputTemp"
        min="0.1"
        max="2.0"
        step="0.1"
        value="1.0"
      />
      <span class="slider-val" id="tempVal">1.0</span>
    </div>

    <button class="btn-generar" id="btnGenerar">
      <span id="btnIcon">⚡</span>
      <span id="btnText">Generar nombre</span>
    </button>

    <div class="result-panel" id="resultPanel">
      <div class="result-label">Nombre generado</div>
      <div class="result-name" id="resultName"></div>
      <div class="result-run" id="resultRun"></div>
    </div>

    <button class="btn-describir" id="btnDescribir">
      <span id="descIcon">🔍</span>
      <span id="descText">Obtener descripción de dinosaurio</span>
    </button>

    <div class="desc-panel" id="descPanel">
      <div class="desc-panel-label">Descripción · Phi4</div>
      <p class="desc-panel-text" id="descPanelText"></p>
    </div>

    <button class="btn-imagen" id="btnImagen">
      <span id="imgIcon">🎨</span>
      <span id="imgText">Generar imagen</span>
    </button>

    <div class="img-panel" id="imgPanel">
      <img id="imgResult" src="" alt="Dinosaurio generado" />
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script>
  /* ── Datos de dinosaurios ────────────────────────────────────────────────── */
  const DINOSAURIOS = [
    {
      name: "Kalavenator",
      era: "Cretácico · Terópodo",
      img: "Imagenes generadas/Kalavenator.jpeg",
      desc: "Del latín 'venator' (cazador), el Kalavenator era un depredador ágil y formidable. Con dientes serrados y sentidos extraordinariamente agudos, ocupaba el rol de depredador supremo en su ecosistema, acechando a sus presas con precisión letal."
    },
    {
      name: "Meginosaurus",
      era: "Cretácico Tardío · Terópodo",
      img: "Imagenes generadas/Meginosaurus.jpeg",
      desc: "Un enorme terópodo que dominó su ecosistema durante el Cretácico tardío. Su nombre evoca 'gran lagarto', y sus extremidades robustas junto con sus poderosas mandíbulas le permitían cazar a los grandes herbívoros de su época."
    },
    {
      name: "Rexcanoceratops",
      era: "Cretácico · Terópodo",
      img: "Imagenes generadas/Rexcanoceratops.jpeg",
      desc: "Una fusión evolutiva única entre los terópodos y la familia de los ceratópsidos. Poseía cuernos y volantes faciales que lo distinguían de cualquier otro depredador conocido, representando una fascinante convergencia morfológica."
    },
    {
      name: "Trigyadrorox",
      era: "Mesozoico · Terópodo",
      img: "Imagenes generadas/Trigyadrorox.jpeg",
      desc: "Un terópodo bípedo con una adaptación corporal tripodal sin precedentes. Esta estructura adicional pudo haberle conferido ventajas únicas en equilibrio o caza, situándolo en un nicho ecológico completamente propio."
    },
    {
      name: "Topraptor",
      era: "Cretácico · Dromeosáurido",
      img: "Imagenes generadas/Topraptor.jpeg",
      desc: "Un depredador ágil y altamente especializado, comparable a los dromeosáuridos como el Velociraptor. Inteligencia aguda, velocidad excepcional y estrategias de caza adaptativas lo coronaban como uno de los ápices predadores de su tiempo."
    },
    {
      name: "Ptenosaurus",
      era: "Jurásico · Pterosaurio",
      img: "Imagenes generadas/Ptenosaurus.jpeg",
      desc: "Un pterosaurio con alas de gran envergadura que surcaba las costas prehistóricas. Se alimentaba de peces y pequeñas presas terrestres desde el aire, dominando los cielos con una agilidad extraordinaria."
    },
    {
      name: "Alcotit",
      era: "Mesozoico · Herbívoro",
      img: "Imagenes generadas/Alcotit.jpeg",
      desc: "Un dinosaurio herbívoro de hábitos nocturnos con adaptaciones únicas para entornos de baja luminosidad. Sus presuntas capacidades de visión nocturna lo convierten en uno de los ejemplares más intrigantes del registro fósil especulativo."
    },
    {
      name: "Brasaurus",
      era: "Cretácico · Saurópodo",
      img: "Imagenes generadas/Brasaurus.jpeg",
      desc: "Un majestuoso saurópodo de cuello largo que prosperó en los exuberantes paisajes prehistóricos de Sudamérica. Su estructura esquelética única le permitía alimentarse eficientemente de la diversa flora de su entorno."
    },
    {
      name: "Brasidais",
      era: "Cretácico · Hadrosáurido",
      img: "Imagenes generadas/Brasidais.jpeg",
      desc: "Un posible hadrosáurido ornitisco del antiguo Brasil. Conocido por sus elaboradas baterías dentales y potenciales comportamientos sociales, lo que sugiere que vivía en grupos y comunicaba señales complejas entre individuos."
    },
    {
      name: "Alwinisaurus",
      era: "Mesozoico · Especie única",
      img: "Imagenes generadas/Alwinisaurus.jpeg",
      desc: "Descubierto en una región de características particulares, este dinosaurio presentaba rasgos morfológicos que lo diferenciaban de todas las demás especies conocidas, posiblemente producto de adaptaciones ambientales altamente especializadas."
    },
  ];

  /* ── Render cards ────────────────────────────────────────────────────────── */
  const grid = document.getElementById('grid');

  DINOSAURIOS.forEach(dino => {
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img">
        <img src="${dino.img}" alt="${dino.name}" loading="lazy" />
      </div>
      <div class="card-body">
        <div class="card-name">${dino.name}</div>
        <div class="card-era">${dino.era}</div>
        <p class="card-desc">${dino.desc}</p>
      </div>
    `;
    grid.appendChild(card);
  });

  /* ── Modal logic ─────────────────────────────────────────────────────────── */
  const backdrop   = document.getElementById('modalBackdrop');
  const btnAbrir   = document.getElementById('btnAbrir');
  const btnCerrar  = document.getElementById('btnCerrar');
  const btnGenerar = document.getElementById('btnGenerar');
  const inputPref  = document.getElementById('inputPrefijo');
  const inputTemp  = document.getElementById('inputTemp');
  const tempVal    = document.getElementById('tempVal');
  const resultPanel = document.getElementById('resultPanel');
  const resultName  = document.getElementById('resultName');
  const resultRun   = document.getElementById('resultRun');
  const errorMsg    = document.getElementById('errorMsg');
  const btnIcon     = document.getElementById('btnIcon');
  const btnText     = document.getElementById('btnText');

  const API_BASE         = 'http://3.234.79.156:8000';
  const API_GENERATE     = `${API_BASE}/generate`;
  const API_PREDICT      = `${API_BASE}/predict`;
  const API_GEN_IMAGE    = `${API_BASE}/generate-image`;

  const btnDescribir  = document.getElementById('btnDescribir');
  const descPanel     = document.getElementById('descPanel');
  const descPanelText = document.getElementById('descPanelText');
  const descIcon      = document.getElementById('descIcon');
  const descText      = document.getElementById('descText');
  const btnImagen     = document.getElementById('btnImagen');
  const imgPanel      = document.getElementById('imgPanel');
  const imgResult     = document.getElementById('imgResult');
  const imgIcon       = document.getElementById('imgIcon');
  const imgText       = document.getElementById('imgText');

  function openModal() {
    backdrop.classList.add('open');
    inputPref.focus();
    resetResult();
  }

  function closeModal() {
    backdrop.classList.remove('open');
  }

  function resetResult() {
    resultPanel.classList.remove('visible');
    btnDescribir.classList.remove('visible');
    descPanel.classList.remove('visible');
    descPanelText.textContent = '';
    btnImagen.classList.remove('visible');
    imgPanel.classList.remove('visible');
    imgResult.src = '';
    errorMsg.classList.remove('visible');
    errorMsg.textContent = '';
  }

  btnAbrir.addEventListener('click', openModal);
  btnCerrar.addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  inputTemp.addEventListener('input', () => {
    tempVal.textContent = parseFloat(inputTemp.value).toFixed(1);
  });

  /* ── API call ────────────────────────────────────────────────────────────── */
  btnGenerar.addEventListener('click', async () => {
    resetResult();

    const prefix      = inputPref.value.trim();
    const temperature = parseFloat(inputTemp.value);

    btnGenerar.disabled = true;
    btnIcon.innerHTML = '<span class="spinner"></span>';
    btnText.textContent = 'Generando…';

    try {
      const res = await fetch(API_GENERATE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prefix, temperature })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();

      resultName.textContent = data.name;
      resultRun.textContent  = `run: ${data.run_id}`;
      resultPanel.classList.add('visible');
      btnDescribir.classList.add('visible');

    } catch (err) {
      errorMsg.textContent = `No se pudo generar el nombre: ${err.message}`;
      errorMsg.classList.add('visible');
    } finally {
      btnGenerar.disabled = false;
      btnIcon.textContent = '⚡';
      btnText.textContent = 'Generar nombre';
    }
  });

  /* ── Predict (descripción LLM) ───────────────────────────────────────────── */
  btnDescribir.addEventListener('click', async () => {
    const name = resultName.textContent.trim();
    if (!name) return;

    descPanel.classList.remove('visible');
    descPanelText.textContent = '';
    errorMsg.classList.remove('visible');

    btnDescribir.disabled = true;
    descIcon.innerHTML = '<span class="spinner"></span>';
    descText.textContent = 'Consultando al modelo…';

    try {
      const res = await fetch(API_PREDICT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();
      descPanelText.textContent = data.description;
      descPanel.classList.add('visible');
      btnImagen.classList.add('visible');

    } catch (err) {
      errorMsg.textContent = `No se pudo obtener la descripción: ${err.message}`;
      errorMsg.classList.add('visible');
    } finally {
      btnDescribir.disabled = false;
      descIcon.textContent = '🔍';
      descText.textContent = 'Obtener descripción de dinosaurio';
    }
  });

  /* ── Generar imagen ──────────────────────────────────────────────────────── */
  btnImagen.addEventListener('click', async () => {
    const prompt = descPanelText.textContent.trim();
    if (!prompt) return;

    imgPanel.classList.remove('visible');
    imgResult.src = '';
    errorMsg.classList.remove('visible');

    btnImagen.disabled = true;
    imgIcon.innerHTML = '<span class="spinner"></span>';
    imgText.textContent = 'Generando imagen…';

    try {
      const res = await fetch(API_GEN_IMAGE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const blob = await res.blob();
      imgResult.src = URL.createObjectURL(blob);
      imgPanel.classList.add('visible');

    } catch (err) {
      errorMsg.textContent = `No se pudo generar la imagen: ${err.message}`;
      errorMsg.classList.add('visible');
    } finally {
      btnImagen.disabled = false;
      imgIcon.textContent = '🎨';
      imgText.textContent = 'Generar imagen';
    }
  });

  inputPref.addEventListener('keydown', e => {
    if (e.key === 'Enter') btnGenerar.click();
  });
</script>
</body>
</html>
